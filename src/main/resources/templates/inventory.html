<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(60,197,255,0.18), transparent 28%),
                radial-gradient(circle at bottom center, rgba(55,255,160,0.12), transparent 24%),
                linear-gradient(135deg, #06101b, #0a1f33 45%, #092437 100%);
            color: #e9f5ff;
            min-height: 100vh;
        }
        .glass {
            background: rgba(10, 28, 42, 0.82);
            border: 1px solid rgba(120, 182, 214, 0.18);
            border-radius: 22px;
        }
        .text-soft { color: #9db3c7; }
        table { color: #e9f5ff !important; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">Inventory Module</h1>
        <div>
            <a href="/" class="btn btn-outline-info btn-sm">Dashboard</a>
            <a href="/analysis" class="btn btn-info btn-sm">Sales Analysis</a>
        </div>
    </div>

    <div class="glass p-4">
        <p class="text-soft">Track stock levels, manage suppliers, and identify products that need reordering.</p>
        <div class="table-responsive">
            <table class="table table-dark table-borderless align-middle">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>SKU</th>
                    <th>Category</th>
                    <th>Qty</th>
                    <th>Reorder</th>
                    <th>Supplier</th>
                    <th>Unit Price</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${products}">
                    <td th:text="${item.name}">Name</td>
                    <td th:text="${item.sku}">SKU</td>
                    <td th:text="${item.category}">Category</td>
                    <td th:classappend="${item.lowStock} ? 'text-warning fw-bold' : 'text-success fw-bold'" th:text="${item.quantity}">0</td>
                    <td th:text="${item.reorderLevel}">0</td>
                    <td th:text="${item.supplierName}">Supplier</td>
                    <td>R <span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
